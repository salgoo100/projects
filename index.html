    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #0f172a; /* Slate 900 */
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      display: none; /* Hidden until checking cache */
    }
    .login-container {
      background-color: #1e293b; /* Slate 800 */
      padding: 40px 30px;
      border-radius: 16px;
      border: 1px solid #b45309; /* Deep Gold */
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h2 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      font-weight: 700;
      color: #f8fafc;
    }
    p {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 25px;
      line-height: 1.5;
    }
    input[type="password"] {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border: 1px solid #475569;
      border-radius: 8px;
      background-color: #0f172a;
      color: #ffffff;
      font-size: 1rem;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: #b45309;
    }
    button {
      background-color: #b45309;
      color: #ffffff;
      border: none;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #92400e;
    }
    .error-msg {
      color: #ef4444;
      margin-top: 12px;
      font-size: 0.85rem;
      min-height: 1.2rem;
    }
  </style>
</head>

    <button onclick="submitPassword()">접속하기</button>
    <div id="error-msg" class="error-msg"></div>
  </div>
