  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #0f172a; /* Slate 900 */
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      display: none; /* Hidden until checking cache */
    }
    .login-container {
      background-color: #1e293b; /* Slate 800 */
      padding: 40px 30px;
      border-radius: 16px;
      border: 1px solid #b45309; /* Deep Gold */
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h2 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      font-weight: 700;
      color: #f8fafc;
    }
    p {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 25px;
      line-height: 1.5;
    }
    input[type="password"] {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border: 1px solid #475569;
      border-radius: 8px;
      background-color: #0f172a;
      color: #ffffff;
      font-size: 1rem;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: #b45309;
    }
    button {
      background-color: #b45309;
      color: #ffffff;
      border: none;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #92400e;
    }
    .error-msg {
      color: #ef4444;
      margin-top: 12px;
      font-size: 0.85rem;
      min-height: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>🔒 보안 문서 본인 인증</h2>
    <p>본 장례 정산 문서는 유족 개인정보 보호를 위해 암호화되어 있습니다. 비밀번호를 입력해주세요.</p>
    <input type="password" id="password" placeholder="비밀번호 입력..." onkeypress="handleKeyPress(event)" autofocus>
    <button onclick="submitPassword()">접속하기</button>
    <div id="error-msg" class="error-msg"></div>
  </div>

    const requiredPwd = "5679346";

    // Auto-login from sessionStorage if password cached
    window.addEventListener('DOMContentLoaded', () => {
      // 1. Check file-specific password cache
      const specificCache = sessionStorage.getItem('report_password_' + location.pathname);
      if (specificCache && decryptPage(specificCache)) {
        return;
      }
      
      // 2. Fallback to global portal password cache
      const globalCache = sessionStorage.getItem('report_password');
      if (globalCache && decryptPage(globalCache)) {
        return;
      }

      // Show prompt if both fail
      document.body.style.display = 'flex';
    });

    function submitPassword() {
      const pwd = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      errorMsg.innerText = '';
      
      if (!pwd) {
        errorMsg.innerText = '비밀번호를 입력해주세요.';
        return;
      }

      if (decryptPage(pwd)) {
        // Success
      } else {
        errorMsg.innerText = '비밀번호가 올바르지 않습니다.';
      }
    }

    function decryptPage(pwd) {
      try {
        const decrypted = CryptoJS.AES.decrypt(encryptedData, pwd);
        const rawText = decrypted.toString(CryptoJS.enc.Utf8);
        
        if (!rawText || rawText.length === 0 || (!rawText.startsWith('<!DOCTYPE') && !rawText.startsWith('<html') && !rawText.startsWith('<!doctype'))) {
          return false;
        }
        
        // Save to specific cache
        sessionStorage.setItem('report_password_' + location.pathname, pwd);
        
        // Save to global cache if it is the portal password
        if (pwd === '5679346') {
          sessionStorage.setItem('report_password', pwd);
        }
        
        // Inject decrypted HTML
        const parser = new DOMParser();
        const doc = parser.parseFromString(rawText, 'text/html');
        
        document.title = doc.title || "장례 정산 보고서";
        document.documentElement.className = doc.documentElement.className;
        
        // Replace head and body content
        document.head.innerHTML = doc.head.innerHTML;
        document.body.innerHTML = doc.body.innerHTML;
        document.body.removeAttribute('style'); // remove display style
        
        // Re-execute script tags
        const scripts = Array.from(document.querySelectorAll('script'));
        scripts.forEach(oldScript => {
          if (oldScript.src && oldScript.src.includes('crypto-js')) return; // skip CryptoJS itself
          const newScript = document.createElement('script');
          Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
          if (oldScript.src) {
            newScript.src = oldScript.src;
          } else {
            newScript.textContent = oldScript.textContent;
          }
          oldScript.parentNode.replaceChild(newScript, oldScript);
        });

        // CRITICAL FIX: Manually dispatch DOMContentLoaded so that
        // initialization scripts waiting for this event can execute immediately!
        document.dispatchEvent(new Event('DOMContentLoaded'));
        
        return true;
      } catch (e) {
        return false;
      }
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter') {
        submitPassword();
      }
    }
