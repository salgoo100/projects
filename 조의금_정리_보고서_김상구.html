<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>장례 조의금 명부 (상주: 김상구)</title>
  <meta name="description" content="외할머니 장례식 상주 김상구 기준 조의금 수입 현황 보고서입니다.">
  
  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg-primary: #f8fafc;
      --bg-card: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --border-color: #e2e8f0;
      --accent-color: #b45309; /* Deep Gold Accent */
      --accent-hover: #92400e;
      --slate-100: #f1f5f9;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      --green-accent: #0f766e;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      padding: 0 0 80px 0;
    }

    header {
      background-color: var(--slate-900);
      color: #ffffff;
      padding: 40px 20px;
      text-align: center;
      border-bottom: 4px solid var(--accent-color);
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      margin-bottom: 8px;
    }

    header p {
      font-size: 1.1rem;
      color: #94a3b8;
      font-weight: 300;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto 0 auto;
      padding: 0 20px;
    }

    /* Tabs Navigation */
    .tabs-nav {
      display: flex;
      justify-content: center;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 30px;
      gap: 10px;
    }

    .tab-btn {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text-secondary);
      padding: 12px 24px;
      cursor: pointer;
      position: relative;
      transition: color 0.2s ease;
    }

    .tab-btn:hover {
      color: var(--text-primary);
    }

    .tab-btn.active {
      color: var(--accent-color);
      font-weight: 700;
    }

    .tab-btn.active::after {
      content: "";
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 3px;
      background-color: var(--accent-color);
      border-radius: 3px 3px 0 0;
    }

    /* Tab Content */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Summary Cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 35px;
    }

    @media (max-width: 500px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .card-label {
      font-size: 0.9rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .card-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .card-subtext {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .card.income {
      border-left: 5px solid var(--green-accent);
    }
    .card.guests {
      border-left: 5px solid var(--accent-color);
    }

    /* Dashboard Layout */
    .dashboard-layout {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 30px;
      margin-bottom: 40px;
    }

    @media (max-width: 768px) {
      .dashboard-layout {
        grid-template-columns: 1fr;
      }
    }

    .chart-container {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .chart-title {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 20px;
      border-left: 4px solid var(--accent-color);
      padding-left: 10px;
    }

    /* Controls */
    .controls-container {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .search-row {
      display: flex;
      gap: 12px;
    }

    .search-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: var(--accent-color);
    }

    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-tag {
      background-color: var(--slate-100);
      color: var(--text-secondary);
      border: 1px solid transparent;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-tag:hover {
      background-color: var(--border-color);
      color: var(--text-primary);
    }

    .filter-tag.active {
      background-color: var(--slate-800);
      color: #ffffff;
      font-weight: 600;
    }

    /* Table styles */
    .table-container {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      margin-bottom: 25px;
    }

    .table-responsive {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.95rem;
    }

    th {
      background-color: var(--slate-100);
      color: var(--text-primary);
      font-weight: 600;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-color);
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-secondary);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background-color: #fafaf9;
      color: var(--text-primary);
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 4px;
      background-color: var(--slate-100);
      color: var(--text-secondary);
    }

    .badge.ref {
      background-color: #ffedd5;
      color: #c2410c;
    }

    .badge.warn {
      background-color: #fee2e2;
      color: #991b1b;
    }

    /* Action Buttons */
    .action-row {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: var(--slate-800);
      color: #ffffff;
      border: none;
      padding: 10px 18px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn:hover {
      background-color: var(--slate-900);
    }

    .btn.outline {
      background-color: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn.outline:hover {
      background-color: var(--slate-100);
    }

    /* Print styling */
    @media print {
      body {
        background-color: #ffffff !important;
        color: #000000 !important;
        padding: 0 !important;
      }
      header {
        background-color: transparent !important;
        color: #000000 !important;
        border-bottom: 2px solid #000000 !important;
        padding: 20px 0 !important;
      }
      header p {
        color: #555555 !important;
      }
      .no-print {
        display: none !important;
      }
      .container {
        max-width: 100% !important;
        margin: 20px 0 0 0 !important;
        padding: 0 !important;
      }
      .card {
        box-shadow: none !important;
        border: 1px solid #000000 !important;
      }
      .table-container {
        box-shadow: none !important;
        border: 1px solid #000000 !important;
        border-radius: 0 !important;
        overflow: visible !important;
      }
      table {
        font-size: 0.85rem !important;
      }
      th {
        background-color: #f0f0f0 !important;
        border-bottom: 2px solid #000000 !important;
      }
      td {
        border-bottom: 1px solid #cccccc !important;
      }
      .tab-content {
        display: block !important;
        opacity: 1 !important;
        transform: none !important;
        margin-bottom: 40px;
      }
      .dashboard-layout {
        display: block !important;
      }
      .chart-container {
        display: none !important; /* Hide chart in print */
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>장례 조의금 명부</h1>
    <p>상주: <strong>김상구</strong> 기준 조의금 수입 내역</p>
  </header>

  <div class="container">
    
    <!-- Action buttons -->
    <div class="action-row no-print">
      <button class="btn outline" onclick="window.print()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        인쇄 / PDF 저장
      </button>
    </div>

    <!-- Tabs Navigation -->
    <div class="tabs-nav no-print">
      <button class="tab-btn active" onclick="switchTab('dashboard', this)">수입 대시보드</button>
      <button class="tab-btn" onclick="switchTab('guestbook', this)">조의금 명부 전체 (36명)</button>
    </div>

    <!-- Tab 1: Dashboard -->
    <div id="dashboard" class="tab-content active">
      
      <!-- Summary Cards -->
      <div class="summary-grid">
        <div class="card income">
          <div class="card-label">총 조의금 수입 (김상구)</div>
          <div class="card-value" id="val-total-income">0 원</div>
          <div class="card-subtext">실제 수취 완료된 조의금 금액</div>
        </div>
        <div class="card guests">
          <div class="card-label">총 접수 인원 (김상구)</div>
          <div class="card-value" id="val-guest-count">0 명</div>
          <div class="card-subtext">번호 없는 24명 포함</div>
        </div>
      </div>

      <!-- Dashboard Layout -->
      <div class="dashboard-layout">
        <!-- Summary Stats table -->
        <div class="chart-container" style="justify-content: flex-start;">
          <h3 class="chart-title">금액대별 요약 정보</h3>
          <div class="table-responsive">
            <table id="table-summary-bracket">
              <thead>
                <tr>
                  <th>구분</th>
                  <th>인원 수 (명)</th>
                  <th>합계 금액 (원)</th>
                  <th>비율 (%)</th>
                </tr>
              </thead>
              <tbody>
                <!-- Dynamic -->
              </tbody>
            </table>
          </div>
        </div>

        <!-- Doughnut chart -->
        <div class="chart-container">
          <h3 class="chart-title">금액대별 분포 비율</h3>
          <canvas id="chartAmountBracket" style="max-height: 250px;"></canvas>
        </div>
      </div>

    </div>

    <!-- Tab 2: Guestbook -->
    <div id="guestbook" class="tab-content">
      
      <!-- Controls -->
      <div class="controls-container no-print">
        <div class="search-row">
          <input type="text" id="search-input" class="search-input" placeholder="조문객 성함을 검색하세요..." oninput="applyFilters()">
        </div>
        <div>
          <div class="filter-tags">
            <button class="filter-tag active" onclick="setNumFilter('ALL', this)">전체보기 (36)</button>
            <button class="filter-tag" onclick="setNumFilter('HAS_NUM', this)">번호 있음 (12)</button>
            <button class="filter-tag" onclick="setNumFilter('NO_NUM', this)">번호 없음 (24)</button>
          </div>
        </div>
      </div>

      <!-- Guest Table -->
      <div class="table-container">
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th style="width: 100px;">번호</th>
                <th>조문객 성함</th>
                <th style="text-align: right; width: 200px;">조의금 금액 (원)</th>
                <th>상주 (관계자)</th>
                <th>비고</th>
              </tr>
            </thead>
            <tbody id="guest-table-body">
              <!-- Dynamic -->
            </tbody>
          </table>
        </div>
      </div>

    </div>

  </div>

  <script>
    // Embedded Data
    const incomesData = [{"num":"19","name":"유승준","amountWon":200000,"refPerson":"김상구","note":""},{"num":"66","name":"김연지","amountWon":200000,"refPerson":"김상구","note":""},{"num":"67","name":"고결","amountWon":100000,"refPerson":"김상구","note":""},{"num":"68","name":"유승환","amountWon":200000,"refPerson":"김상구","note":""},{"num":"69","name":"이정빈","amountWon":100000,"refPerson":"김상구","note":""},{"num":"80","name":"김준용","amountWon":100000,"refPerson":"김상구","note":""},{"num":"81","name":"김진호","amountWon":200000,"refPerson":"김상구","note":""},{"num":"83","name":"이병춘","amountWon":100000,"refPerson":"김상구","note":""},{"num":"133","name":"김형철","amountWon":100000,"refPerson":"김상구","note":""},{"num":"134","name":"김상훈","amountWon":100000,"refPerson":"김상구","note":""},{"num":"135","name":"박주형","amountWon":100000,"refPerson":"김상구","note":""},{"num":"206","name":"김창수","amountWon":500000,"refPerson":"김상구","note":""},{"num":"","name":"정민규","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"박종현","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"곽충근","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"이예진","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"이장호","amountWon":100000,"refPerson":"김상구","note":""},{"num":"","name":"정명수","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"진용준","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"황진범","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"문병철","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"김준호","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"정현명","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"손영준","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"전은하","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"권보람","amountWon":100000,"refPerson":"김상구","note":""},{"num":"","name":"김동식","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"홍창기","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"황한응","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"이슬기","amountWon":100000,"refPerson":"김상구","note":""},{"num":"","name":"지정강","amountWon":70000,"refPerson":"김상구","note":""},{"num":"","name":"이영우","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"윤영선","amountWon":50000,"refPerson":"김상구","note":""},{"num":"","name":"이민섭","amountWon":100000,"refPerson":"김상구","note":""},{"num":"","name":"강세영","amountWon":100000,"refPerson":"김상구","note":""},{"num":"","name":"김재형","amountWon":100000,"refPerson":"김상구","note":""}];

    // State
    let currentTab = 'dashboard';
    let searchQuery = '';
    let selectedNumFilter = 'ALL'; // 'ALL', 'HAS_NUM', 'NO_NUM'

    // Statistics
    const totalIncome = incomesData.reduce((sum, item) => sum + item.amountWon, 0);

    document.addEventListener("DOMContentLoaded", () => {
      // Set summary cards
      document.getElementById('val-total-income').innerText = totalIncome.toLocaleString() + ' 원';
      document.getElementById('val-guest-count').innerText = incomesData.length + ' 명';

      // Populate tables
      populateSummaryBracketTable();
      applyFilters();

      // Build charts
      buildCharts();
    });

    // Switch Tabs
    function switchTab(tabId, btnElement) {
      currentTab = tabId;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      btnElement.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
    }

    // Filter controls
    function setNumFilter(filterMode, btnElement) {
      selectedNumFilter = filterMode;
      document.querySelectorAll('.filter-tag').forEach(tag => tag.classList.remove('active'));
      btnElement.classList.add('active');
      applyFilters();
    }

    // Filter guest list
    function applyFilters() {
      searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
      
      const filtered = incomesData.filter(item => {
        const matchesSearch = searchQuery === '' || item.name.toLowerCase().includes(searchQuery);
        
        let matchesNum = true;
        if (selectedNumFilter === 'HAS_NUM') {
          matchesNum = item.num !== "";
        } else if (selectedNumFilter === 'NO_NUM') {
          matchesNum = item.num === "";
        }

        return matchesSearch && matchesNum;
      });

      const tbody = document.getElementById('guest-table-body');
      tbody.innerHTML = '';

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 30px;">결과가 없습니다.</td></tr>';
        return;
      }

      filtered.forEach(item => {
        const tr = document.createElement('tr');
        const numDisplay = item.num === "" ? '<span class="badge warn">번호없음</span>' : item.num;
        
        tr.innerHTML = `
          <td>${numDisplay}</td>
          <td style="font-weight: 500; color: var(--text-primary);">${item.name}</td>
          <td style="text-align: right; font-weight: 600; color: var(--text-primary);">${item.amountWon.toLocaleString()} 원</td>
          <td><span class="badge ref">${item.refPerson}</span></td>
          <td>${item.note}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Bracket Summary Table
    function populateSummaryBracketTable() {
      const brackets = {};
      incomesData.forEach(item => {
        const amt = item.amountWon;
        if (!brackets[amt]) {
          brackets[amt] = { count: 0, total: 0 };
        }
        brackets[amt].count++;
        brackets[amt].total += amt;
      });

      const sortedAmt = Object.keys(brackets).sort((a, b) => parseInt(b, 10) - parseInt(a, 10));
      const tbody = document.getElementById('table-summary-bracket');
      tbody.innerHTML = '';

      sortedAmt.forEach(amtStr => {
        const amt = parseInt(amtStr, 10);
        const count = brackets[amtStr].count;
        const total = brackets[amtStr].total;
        const percentage = totalIncome > 0 ? ((total / totalIncome) * 100).toFixed(1) : '0';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="font-weight: 500; color: var(--text-primary);">${(amt / 10000).toLocaleString()} 만원</td>
          <td>${count} 명</td>
          <td style="text-align: right; font-weight: 600;">${total.toLocaleString()} 원</td>
          <td style="text-align: right;">${percentage} %</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Build Chart
    function buildCharts() {
      const brackets = {};
      incomesData.forEach(item => {
        const label = (item.amountWon / 10000) + '만원';
        brackets[label] = (brackets[label] || 0) + 1;
      });

      const sortedLabels = Object.keys(brackets).sort((a, b) => {
        return parseInt(a.replace('만원', ''), 10) - parseInt(b.replace('만원', ''), 10);
      });
      const dataValues = sortedLabels.map(l => brackets[l]);

      const colors = [
        'rgba(148, 163, 184, 0.7)', // 5만원
        'rgba(245, 158, 11, 0.7)',  // 7만원
        'rgba(180, 83, 9, 0.7)',   // 10만원
        'rgba(30, 41, 59, 0.7)',    // 20만원
        'rgba(15, 118, 110, 0.7)'   // 50만원
      ];

      const ctx = document.getElementById('chartAmountBracket').getContext('2d');
      new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: sortedLabels,
          datasets: [{
            data: dataValues,
            backgroundColor: colors.slice(0, sortedLabels.length),
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              position: 'right',
              labels: {
                boxWidth: 12,
                font: { size: 11 }
              }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  const val = context.raw;
                  const total = context.dataset.data.reduce((a, b) => a + b, 0);
                  const pct = ((val / total) * 100).toFixed(1);
                  return ' ' + val + ' 명 (' + pct + '%)';
                }
              }
            }
          }
        }
      });
    }
  </script>
</body>
</html>
