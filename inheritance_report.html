        if (pwd === '5679346') {

        const doc = parser.parseFromString(rawText, 'text/html');

        document.documentElement.className = doc.documentElement.className;
        
        document.head.innerHTML = doc.head.innerHTML;
        document.body.innerHTML = doc.body.innerHTML;
        document.body.removeAttribute('style'); // remove display style
        
        // Start async script execution sequence
        (async () => {
          console.log("[decryptPage] Re-executing injected scripts...");
          const scripts = Array.from(document.querySelectorAll('script'));
          console.log("[decryptPage] Total script tags found:", scripts.length);
          
          const externalScripts = [];
          const inlineScripts = [];
          
          scripts.forEach(script => {
            if (script.src && (script.src.includes('crypto-js') || script.src.includes('cdnjs.cloudflare.com'))) {
              return;
            }
            if (script.textContent && (script.textContent.includes('decryptPage') || script.textContent.includes('CryptoJS'))) {
              return;
            }
            if (script.src) {
              externalScripts.push(script);
            } else {
              inlineScripts.push(script);
            }
          });
          
          console.log('[decryptPage] Classified: ' + externalScripts.length + ' external, ' + inlineScripts.length + ' inline scripts.');
          
          // Load external scripts sequentially
          for (let i = 0; i < externalScripts.length; i++) {
            const oldScript = externalScripts[i];
            console.log('[decryptPage] External Script ' + i + ': Loading... SRC: ' + oldScript.src);

              const newScript = document.createElement('script');
              Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));

              newScript.onload = () => {

                resolve();
              };
              newScript.onerror = () => {
                console.error('[decryptPage] External Script ' + i + ': Failed to load.');
                resolve(); // Resolve to avoid blocking
              };
              oldScript.parentNode.replaceChild(newScript, oldScript);
            });
          }
          
          // Execute inline scripts sequentially

          console.log("[decryptPage] Decryption and load workflow complete.");
